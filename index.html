<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TallerPro GT v3</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap');
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--border:#333;--border2:#444;--text:#e8e4dc;--text2:#9a9690;--text3:#5a5650;--accent:#e8a820;--accent2:#f0c050;--accent-dim:rgba(232,168,32,.15);--green:#4caf7d;--green-dim:rgba(76,175,125,.12);--red:#e05a4e;--red-dim:rgba(224,90,78,.12);--blue:#4a9eff;--blue-dim:rgba(74,158,255,.12);--purple:#9b7fff;--font-main:'Syne',sans-serif;--font-mono:'IBM Plex Mono',monospace;--radius:6px;--radius-lg:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);font-size:14px;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
#app{display:none;height:100vh;flex-direction:row}
#app.visible{display:flex}
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:18px 20px}
.sidebar-logo{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo h1{font-size:16px;font-weight:700;color:var(--accent)}
.sidebar-logo p{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--font-mono)}
#nav-menu{flex:1;overflow-y:auto;padding-bottom:8px}
.nav-section{padding:10px 12px 3px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;border-radius:var(--radius);margin:1px 6px;color:var(--text2);font-size:12.5px;font-weight:500;transition:all .12s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,168,32,.25)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;border-radius:10px;padding:1px 6px}
.sidebar-bottom{padding:8px 6px;border-top:1px solid var(--border);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;white-space:nowrap}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
#topbar-actions{display:flex;gap:7px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-main);font-size:12.5px;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#0f0f0f}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,90,78,.3)}.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}.btn-green:hover{background:var(--green);color:#fff}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,.3)}.btn-blue:hover{background:var(--blue);color:#fff}
.btn-sm{padding:4px 9px;font-size:11.5px}.btn-icon{padding:5px;width:28px;height:28px;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:13px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px}
.stat-label{font-size:10px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:20px;font-weight:700;margin-top:4px;font-family:var(--font-mono)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}
.stat-green .stat-value{color:var(--green)}.stat-red .stat-value{color:var(--red)}.stat-amber .stat-value{color:var(--accent)}.stat-blue .stat-value{color:var(--blue)}
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--bg3)}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.td-mono{font-family:var(--font-mono)}.td-right{text-align:right}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--font-mono)}
.badge-green{background:var(--green-dim);color:var(--green)}.badge-red{background:var(--red-dim);color:var(--red)}
.badge-amber{background:var(--accent-dim);color:var(--accent)}.badge-blue{background:var(--blue-dim);color:var(--blue)}.badge-gray{background:var(--bg4);color:var(--text2)}
.form-group{margin-bottom:12px}
.form-row{display:grid;gap:10px}.form-row-2{grid-template-columns:1fr 1fr}.form-row-3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 9px;color:var(--text);font-family:var(--font-main);font-size:12.5px;outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
select option{background:var(--bg3)}
.form-hint{font-size:10.5px;color:var(--text3);margin-top:3px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;padding:14px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:660px;max-height:93vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-wide{max-width:860px}
.modal-header{padding:14px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:17px}
.modal-footer{padding:12px 17px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2)}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:17px;line-height:1;padding:2px}.modal-close:hover{color:var(--text)}
.alert{padding:8px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:7px}
.alert-green{background:var(--green-dim);border:1px solid rgba(76,175,125,.3);color:var(--green)}
.alert-red{background:var(--red-dim);border:1px solid rgba(224,90,78,.3);color:var(--red)}
.alert-amber{background:var(--accent-dim);border:1px solid rgba(232,168,32,.3);color:var(--accent)}
.alert-blue{background:var(--blue-dim);border:1px solid rgba(74,158,255,.3);color:var(--blue)}
.section-title{font-size:18px;font-weight:700;margin-bottom:3px}
.section-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:13px 0}
.flex{display:flex}.gap-1{gap:6px}.gap-2{gap:10px}.items-center{align-items:center}.justify-between{justify-content:space-between}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-amber{color:var(--accent)}.text-blue{color:var(--blue)}
.text-muted{color:var(--text2)}.text-mono{font-family:var(--font-mono)}.text-right{text-align:right}.text-center{text-align:center}
.mt-1{margin-top:6px}.mt-2{margin-top:12px}.mt-3{margin-top:18px}
.dep-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;display:inline-block}
.dep-fill{height:100%;border-radius:3px}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);margin-bottom:6px}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media print{#sidebar,#topbar,.no-print{display:none!important}body,#main,#content{background:#fff!important;color:#000!important}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo"><h1 style="font-size:15px">TallerPro GT</h1><p id="sidebar-empresa" style="font-size:11px;font-weight:600;color:var(--text2);margin-top:3px">Mi Taller</p><p id="sidebar-nit" style="font-size:9px;color:var(--text3)">NIT: ---</p></div>
    <div id="nav-menu"></div>
    <div class="sidebar-bottom">
      <div class="nav-item" onclick="exportarBackup()"><span>&#128190;</span>Exportar backup</div>
      <div class="nav-item" onclick="importarBackup()"><span>&#128194;</span>Importar backup</div>
    </div>
  </nav>
  <div id="main">
    <div id="topbar">
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div id="topbar-actions"></div>
      <div id="topbar-right" style="display:flex;align-items:center;gap:8px"><div id="topbar-user-info" style="display:none;align-items:center;gap:8px"><span id="topbar-username" onclick="abrirMenuUsuario()" style="font-size:12px;color:var(--text2);font-weight:500;cursor:pointer;padding:4px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;white-space:nowrap"></span><button onclick="logout()" style="background:var(--red-dim);border:1px solid rgba(224,90,78,.3);color:var(--red);cursor:pointer;border-radius:6px;padding:5px 12px;font-size:12px;font-family:var(--font-main);font-weight:600;white-space:nowrap">&#128275; Salir</button></div><span id="badge_licencia" style="font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;white-space:nowrap;background:rgba(232,168,32,.15);color:#f59e0b;border:1px solid rgba(232,168,32,.3)">⚡ DEMO</span><button onclick="abrirSelectorTema()" style="background:none;border:1px solid var(--border2);color:var(--text2);cursor:pointer;border-radius:6px;padding:4px 9px;font-size:12px;font-family:var(--font-main)">Tema</button></div>
    </div>
    <div id="content"></div>
  </div>
</div>
  <script src="js/core.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/empleados.js"></script>
  <script src="js/inventario.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/ordenes.js"></script>
  <script src="js/facturas.js"></script>
  <script src="js/finanzas.js"></script>
  <script src="js/init.js"></script>
  <script src="js/importar.js"></script>
  <script src="js/configuracion.js"></script>
</body>
</html>
