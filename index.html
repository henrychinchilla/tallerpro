const store = {
  async get(key, fallback) {
    try {
      const r = {
        value: localStorage.getItem(key)
      };
      return r.value ? JSON.parse(r.value) : fallback;
    } catch {
      return fallback;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch {}
  }
};

// ---------- Cálculo de totales ----------
const calcularTotales = (orden, iva_pct = 12) => {
  const items = orden.items || [];
  const total_mano_obra = items.filter(i => i.tipo === 'servicio').reduce((s, i) => s + Number(i.subtotal || 0), 0);
  const total_repuestos = items.filter(i => i.tipo === 'repuesto').reduce((s, i) => s + Number(i.subtotal || 0), 0);
  const descuento = Number(orden.descuento || 0);
  const subtotal = total_mano_obra + total_repuestos - descuento;
  const iva = Math.round(subtotal * (iva_pct / 100) * 100) / 100;
  const total = Math.round((subtotal + iva) * 100) / 100;
  return {
    total_mano_obra,
    total_repuestos,
    subtotal,
    iva,
    total
  };
};
